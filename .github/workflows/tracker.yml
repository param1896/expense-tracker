# .github/workflows/tracker.yml
name: Expense Tracker

on:
  schedule:
    # Runs at 9:00 AM UTC on the 1st and 15th of every month
    - cron: '0 9 1,15 * *'
  workflow_dispatch:
    inputs:
      reset_data:
        description: 'Clear Transactions tab and re-fetch all history from 2025-01-01'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run expense tracker
        env:
          TELLER_CERT: ${{ secrets.TELLER_CERT }}
          TELLER_KEY: ${{ secrets.TELLER_KEY }}
          TELLER_ACCESS_TOKEN: ${{ secrets.TELLER_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          RESET_DATA: ${{ github.event.inputs.reset_data || 'false' }}
        run: python -m src.main
